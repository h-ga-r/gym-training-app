<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Training App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav aria-label="画面切り替え">
      <button type="button" data-screen-target="timer">タイマー</button>
      <button type="button" data-screen-target="workout-log">記録する</button>
    </nav>

    <main>
      <section id="timer-screen" data-screen>タイマー画面</section>
      <section id="workout-log-screen" data-screen hidden>記録画面</section>
    </main>

    <script src="js/timer.js"></script>
    <script src="js/workoutLog.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
